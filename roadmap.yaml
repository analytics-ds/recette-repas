# Roadmap éditoriale evergreen — recette-repas.com
#
# Format inspiré de meilleur-transport. Adapté au PBN recette-repas :
# - PBN FR uniquement (pas de version EN)
# - Articles dans content/recettes/ (pas blog/)
# - Catégories : "Conseils et astuces", "Plats", "Desserts", "Entrées", "Cuisine du monde", "Batch cooking"
#
# Cadence cible : 4 articles / semaine maximum (cf MEMORY.md)
#
# Skills disponibles dans ce repo :
# - /create-article : création manuelle interactive (basique)
# - Les skills create-article-auto et create-article-seo de meilleur-transport
#   ne sont PAS encore copiées ici. Workflow actuel = manuel via brief Datafer.
#
# CHAMPS
# ------
# kw              (obligatoire) Mot-clé principal SEO ciblé en FR
# category        (obligatoire) Catégorie Hugo : "Conseils et astuces" prioritaire
# volume          (informatif)  Volume FR Semrush
# kd              (informatif)  Keyword Difficulty Semrush
# scheduled_date  (obligatoire) Date à partir de laquelle l'agent peut publier (YYYY-MM-DD)
# status          todo | done | failed
# brief_id        ID brief Datafer une fois créé
# datafer_score   Score final post-publication
# published_date  Date réelle de publication
# published_url   URL de l'article live
# error           Message d'erreur si failed

