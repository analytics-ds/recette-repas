baseURL = "https://recette-repas.com/"
languageCode = "fr-fr"
title = "Recette & Repas"
theme = "recette-repas"
enableRobotsTXT = false
summaryLength = 30
removePathAccents = true
disableKinds = ["taxonomy"]

[taxonomies]
  category = "categories"

[params]
  description = "Des recettes de cuisine faciles et des conseils pour cuisiner au quotidien."
  author = "Julien Marchand"
  author_name = "Julien Marchand"
  author_url = ""
  author_job_title = "Ancien chef de cuisine"

[menus]
  [[menus.main]]
    name = "Entrées"
    url = "/recettes/entrees/"
    weight = 2
  [[menus.main]]
    name = "Plats"
    url = "/recettes/plats/"
    weight = 3
  [[menus.main]]
    name = "Desserts"
    url = "/recettes/desserts/"
    weight = 4
  [[menus.main]]
    name = "Cuisine du monde"
    url = "/recettes/cuisine-monde/"
    weight = 5
  [[menus.main]]
    name = "Conseils et astuces"
    url = "/recettes/conseils-astuces/"
    weight = 6
  [[menus.main]]
    name = "Batch cooking"
    url = "/recettes/batch-cooking/"
    weight = 7

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[markup.goldmark.renderer]
  unsafe = true
