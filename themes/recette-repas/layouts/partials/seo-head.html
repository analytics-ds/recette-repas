<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:locale" content="{{ .Site.LanguageCode | default "fr_FR" }}">
{{ if .IsPage }}
{{ with .Params.author }}<meta property="article:author" content="{{ . }}">{{ end }}
<meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
<meta property="article:modified_time" content="{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}">
{{ range .Params.tags }}<meta property="article:tag" content="{{ . }}">
{{ end }}
{{ end }}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- JSON-LD Schema.org : BlogPosting (articles standards uniquement ; les recettes fournissent leur propre schema Recipe) -->
{{ if and .IsPage (eq .Section "recettes") (ne .Layout "recette") }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ .Title }}",
    "description": "{{ .Description }}",
    "datePublished": "{{ .Date.Format "2006-01-02" }}",
    "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
    "wordCount": {{ .WordCount }},
    "timeRequired": "PT{{ .ReadingTime }}M",
    {{ with .Params.author }}
    "author": {
        "@type": "Person",
        "name": "{{ . }}"{{ with $.Site.Params.author_url }},
        "url": "{{ . }}"{{ end }}{{ with $.Site.Params.author_job_title }},
        "jobTitle": "{{ . }}"{{ end }}
    },
    {{ end }}
    "publisher": {
        "@type": "Organization",
        "name": "{{ .Site.Title }}"
    },
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
    },
    "isPartOf": {
        "@type": "Blog",
        "name": "{{ .Site.Title }}",
        "url": "{{ .Site.BaseURL }}"
    }
}
</script>

<!-- JSON-LD Schema.org : BreadcrumbList (articles) -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
        {
            "@type": "ListItem",
            "position": 1,
            "name": "Accueil",
            "item": "{{ .Site.BaseURL }}"
        },
        {
            "@type": "ListItem",
            "position": 2,
            "name": "Blog",
            "item": "{{ "recettes/" | absURL }}"
        },
        {
            "@type": "ListItem",
            "position": 3,
            "name": "{{ .Title }}",
            "item": "{{ .Permalink }}"
        }
    ]
}
</script>
{{ else if .IsHome }}

<!-- JSON-LD Schema.org : WebSite (accueil) -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "@id": "{{ .Site.BaseURL }}#website",
    "name": "{{ .Site.Title }}",
    "alternateName": "Recette & Repas",
    "description": "{{ .Site.Params.description }}",
    "url": "{{ .Site.BaseURL }}",
    "inLanguage": "fr-FR",
    "publisher": { "@id": "{{ .Site.BaseURL }}#organization" }
}
</script>

<!-- JSON-LD Schema.org : Organization (accueil) -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "{{ .Site.BaseURL }}#organization",
    "name": "Recette & Repas",
    "url": "{{ .Site.BaseURL }}",
    "logo": {
        "@type": "ImageObject",
        "url": "{{ "images/logo-mark.png" | absURL }}",
        "width": 512,
        "height": 512
    },
    "image": "{{ "images/logo-mark.png" | absURL }}",
    "description": "{{ .Site.Params.description }}",
    "slogan": "Des recettes faciles signées par un ancien chef",
    "foundingDate": "2024",
    "email": "contact@recette-repas.com",
    "knowsAbout": ["Cuisine", "Recettes de cuisine", "Pâtisserie", "Cuisine du monde", "Batch cooking", "Astuces de cuisine"],
    "founder": {
        "@type": "Person",
        "name": "Julien Marchand",
        "jobTitle": "Ancien chef de cuisine"
    },
    "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "service client",
        "email": "contact@recette-repas.com",
        "availableLanguage": ["French"]
    },
    "address": {
        "@type": "PostalAddress",
        "addressCountry": "FR"
    },
    "sameAs": [
        "https://www.instagram.com/recetterepas",
        "https://www.facebook.com/recetterepas",
        "https://www.pinterest.fr/recetterepas",
        "https://www.youtube.com/@recetterepas"
    ]
}
</script>
{{ end }}
